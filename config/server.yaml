# APEX Live Dashboard Server Configuration
# Single source of truth for server runtime settings.

server:
  host: 0.0.0.0
  port: 8080

providers:
  longbridge:
    enabled: true
    # Credentials from env: LONGPORT_APP_KEY, LONGPORT_APP_SECRET, LONGPORT_ACCESS_TOKEN
    sub_types: [quote, depth]

symbols:
  universe_path: config/universe.yaml
  from_screener: true
  max_total: 200

persistence:
  duckdb_path: data/server.duckdb
  r2_flush_interval_sec: 300

pipeline:
  timeframes: ["30m", "1h", "4h", "1d"]
  indicators: ["rsi", "dual_macd", "supertrend", "bollinger"]
