name: "R2: Data Pipeline"

# ═══════════════════════════════════════════════════════════════════════════
# R2 data pipeline — universe + historical OHLCV → Cloudflare R2
#
#   universe (daily 06:00 UTC) ──▶ historical (hourly during market)
#                                        └──▶ validate (data_quality.json)
#
# Runs in parallel with existing hourly-signals.yml — no contention.
# ═══════════════════════════════════════════════════════════════════════════

on:
  schedule:
    # Universe refresh — daily at 06:00 UTC (1am ET / 2am ET)
    - cron: '0 6 * * 1-5'
    # Historical delta — hourly during market hours (covers EDT + EST)
    - cron: '0 14-21 * * 1-5'
  workflow_dispatch:
    inputs:
      job:
        description: "Job to run"
        type: choice
        options:
          - all
          - universe
          - historical
          - validate
        default: all
      mode:
        description: "Historical mode"
        type: choice
        options:
          - delta
          - backfill
        default: delta
      symbols:
        description: "Specific symbols (space-separated, empty = all)"
        type: string
        default: ''

concurrency:
  group: r2-data-pipeline
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.13'
  CACHE_VERSION: v1

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Job 0: Universe Builder — FMP screener → R2 meta/
  # ═══════════════════════════════════════════════════════════════════════
  universe:
    name: Universe Builder
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Run on: daily 06:00 cron, manual (all/universe), not on hourly crons
    if: >-
      github.event_name == 'workflow_dispatch' &&
        (inputs.job == 'all' || inputs.job == 'universe')
      || github.event.schedule == '0 6 * * 1-5'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache Python dependencies
        uses: actions/cache@v5
        with:
          path: |
            .venv
            ~/.cache/uv
            ~/.cache/pip
          key: ${{ env.CACHE_VERSION }}-r2-deps-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-r2-deps-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: |
          .venv/bin/python --version 2>/dev/null || uv venv --clear
          source .venv/bin/activate
          uv pip install -e ".[cloudflare]"

      - name: Run universe builder
        run: |
          source .venv/bin/activate
          python scripts/r2_universe_builder.py
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: apex-data

  # ═══════════════════════════════════════════════════════════════════════
  # Job 1: Historical Data Loader — OHLCV → R2 Parquet
  # ═══════════════════════════════════════════════════════════════════════
  historical:
    name: Historical Loader
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Run on: hourly crons, manual (all/historical/validate)
    if: >-
      github.event_name == 'workflow_dispatch' &&
        (inputs.job == 'all' || inputs.job == 'historical' || inputs.job == 'validate')
      || github.event_name == 'schedule' &&
        github.event.schedule != '0 6 * * 1-5'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache Python dependencies
        uses: actions/cache@v5
        with:
          path: |
            .venv
            ~/.cache/uv
            ~/.cache/pip
          key: ${{ env.CACHE_VERSION }}-r2-deps-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-r2-deps-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Cache TA-Lib
        id: cache-talib
        uses: actions/cache@v5
        with:
          path: ~/ta-lib-install
          key: talib-0.6.4-${{ runner.os }}-${{ runner.arch }}

      - name: Install TA-Lib
        run: |
          if [ -d "$HOME/ta-lib-install/lib" ]; then
            echo "Restoring TA-Lib from cache..."
            sudo cp -r $HOME/ta-lib-install/lib/* /usr/lib/
            sudo cp -r $HOME/ta-lib-install/include/* /usr/include/
            sudo ldconfig
          else
            echo "Building TA-Lib 0.6.4 from source..."
            sudo apt-get update && sudo apt-get install -y wget build-essential
            wget https://github.com/ta-lib/ta-lib/releases/download/v0.6.4/ta-lib-0.6.4-src.tar.gz
            tar -xzf ta-lib-0.6.4-src.tar.gz
            cd ta-lib-0.6.4 && ./configure --prefix=/usr && make -j$(nproc) && sudo make install
            sudo ldconfig
            mkdir -p $HOME/ta-lib-install/lib $HOME/ta-lib-install/include
            cp -r /usr/lib/libta* $HOME/ta-lib-install/lib/ 2>/dev/null || true
            cp -r /usr/include/ta-lib $HOME/ta-lib-install/include/ 2>/dev/null || true
          fi

      - name: Install dependencies
        run: |
          .venv/bin/python --version 2>/dev/null || uv venv --clear
          source .venv/bin/activate
          uv pip install -e ".[dev,cloudflare]"

      - name: Determine mode and symbols
        id: config
        run: |
          MODE="${{ inputs.mode || 'delta' }}"
          SYMBOLS="${{ inputs.symbols || '' }}"
          JOB="${{ inputs.job || 'historical' }}"

          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "symbols=$SYMBOLS" >> $GITHUB_OUTPUT
          echo "job=$JOB" >> $GITHUB_OUTPUT

      - name: Run historical loader
        if: steps.config.outputs.job != 'validate'
        run: |
          source .venv/bin/activate
          MODE_FLAG="--${{ steps.config.outputs.mode }}"
          SYMBOLS="${{ steps.config.outputs.symbols }}"
          CMD="python scripts/r2_historical_loader.py $MODE_FLAG"
          if [ -n "$SYMBOLS" ]; then
            CMD="$CMD --symbols $SYMBOLS"
          fi
          echo "Running: $CMD"
          $CMD
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: apex-data

      - name: Run validate-only
        if: steps.config.outputs.job == 'validate'
        run: |
          source .venv/bin/activate
          python scripts/r2_historical_loader.py --validate-only
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: apex-data
