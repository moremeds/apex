name: "Daily: Momentum Screener"

# ═══════════════════════════════════════════════════════════════════════════
# Quantitative momentum screen: 12-1 momentum + FIP composite ranking.
#
# Pipeline:
#   Step 1: Update universe + OHLCV from FMP/yfinance
#   Step 2: Screen and generate watchlist JSON
# ═══════════════════════════════════════════════════════════════════════════

on:
  schedule:
    # Daily Mon-Fri after market close (21:30 UTC = 4:30 PM ET)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

concurrency:
  group: momentum-screen
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.13'
  CACHE_VERSION: v1

jobs:
  screen:
    name: Momentum Screen
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache Python dependencies
        uses: actions/cache@v5
        with:
          path: |
            .venv
            ~/.cache/uv
            ~/.cache/pip
          key: ${{ env.CACHE_VERSION }}-deps-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ env.CACHE_VERSION }}-deps-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-
            ${{ env.CACHE_VERSION }}-deps-${{ runner.os }}-

      - name: Cache TA-Lib
        id: cache-talib
        uses: actions/cache@v5
        with:
          path: ~/ta-lib-install
          key: talib-0.6.4-${{ runner.os }}-${{ runner.arch }}

      - name: Install TA-Lib
        run: |
          if [ -d "$HOME/ta-lib-install/lib" ]; then
            echo "Restoring TA-Lib from cache..."
            sudo cp -r $HOME/ta-lib-install/lib/* /usr/lib/
            sudo cp -r $HOME/ta-lib-install/include/* /usr/include/
            sudo ldconfig
          else
            echo "Building TA-Lib 0.6.4 from source..."
            sudo apt-get update && sudo apt-get install -y wget build-essential
            wget https://github.com/ta-lib/ta-lib/releases/download/v0.6.4/ta-lib-0.6.4-src.tar.gz
            tar -xzf ta-lib-0.6.4-src.tar.gz
            cd ta-lib-0.6.4 && ./configure --prefix=/usr && make -j$(nproc) && sudo make install
            sudo ldconfig
            mkdir -p $HOME/ta-lib-install/lib $HOME/ta-lib-install/include
            cp -r /usr/lib/libta* $HOME/ta-lib-install/lib/ 2>/dev/null || true
            cp -r /usr/include/ta-lib $HOME/ta-lib-install/include/ 2>/dev/null || true
          fi

      - name: Install dependencies
        run: |
          .venv/bin/python --version 2>/dev/null || uv venv --clear
          source .venv/bin/activate
          uv pip install -e ".[dev,observability]"

      # === PIPELINE ===

      - name: Fetch regime data from R2
        run: |
          source .venv/bin/activate
          python -c "
          import json, os, sys
          try:
              from src.infrastructure.adapters.r2.client import R2Client
              client = R2Client()
              data = client.get_json('signals/data/summary.json')
              if data:
                  os.makedirs('out/signals/data', exist_ok=True)
                  with open('out/signals/data/summary.json', 'w') as f:
                      json.dump(data, f)
                  print(f'Fetched summary.json ({len(data.get(\"tickers\", []))} tickers)')
              else:
                  print('WARNING: summary.json not found in R2 — regime will default to R1')
          except Exception as e:
              print(f'WARNING: R2 fetch failed ({e}) — regime will default to R1')
          "
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}

      - name: Run momentum screener
        run: |
          source .venv/bin/activate
          python -m src.runners.momentum_runner
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}

      - name: Upload report artifact
        uses: actions/upload-artifact@v6
        with:
          name: momentum-${{ github.run_id }}
          path: out/momentum/data/momentum_watchlist.json
          if-no-files-found: warn
          retention-days: 7
