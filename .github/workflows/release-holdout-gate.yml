name: "Release: Holdout Validation Gate"

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  holdout-validation:
    name: Holdout Universe Validation
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run Holdout Validation
        run: |
          source .venv/bin/activate
          python -m src.runners.validation_runner holdout \
            --universe config/universe.yaml \
            --timeframes 1d 4h \
            --output reports/holdout_validation.json

      - name: Validate Holdout Gates
        run: |
          source .venv/bin/activate
          python -c "
          import json
          import sys

          with open('reports/holdout_validation.json') as f:
              data = json.load(f)

          print('=' * 60)
          print('HOLDOUT VALIDATION (Release Gate)')
          print('=' * 60)

          if 'gate_results' not in data or not isinstance(data['gate_results'], list):
              print('ERROR: Missing or malformed gate_results in holdout payload')
              sys.exit(1)

          if len(data['gate_results']) == 0:
              print('ERROR: No gate results found - holdout validation incomplete')
              sys.exit(1)

          for gate in data['gate_results']:
              status = 'PASS' if gate['passed'] else 'FAIL'
              print(f\"  {gate['gate_name']}: {status}\")

          if not data.get('all_gates_passed', False):
              print()
              print('ERROR: Holdout validation FAILED')
              sys.exit(1)

          print()
          print('Holdout validation PASSED')
          "

      - name: Upload Holdout Validation Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: holdout-validation-report
          path: reports/holdout_validation.json
          retention-days: 90

      - name: Fail Release on Validation Failure
        if: failure()
        run: |
          echo "::error::Holdout validation failed! Release should not proceed."
          exit 1
